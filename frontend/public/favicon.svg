<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Stethoscope - medical themed logo for NursePath -->
  <!-- Tubing from top (earpiece) -->
  <path d="M50 5 Q50 15 50 20 Q50 30 55 35 Q65 45 70 50 Q78 58 78 68 Q78 82 64 82 Q50 82 50 70" 
        fill="none" stroke="#2A7FFF" stroke-width="4" stroke-linecap="round"/>
  <!-- Chest piece (bell) -->
  <ellipse cx="50" cy="78" rx="16" ry="12" fill="#2A7FFF" opacity="0.9"/>
  <ellipse cx="50" cy="78" rx="10" ry="7" fill="white" opacity="0.3"/>
  <!-- Earpiece -->
  <circle cx="50" cy="5" r="4" fill="#2A7FFF"/>
  <!-- Heartbeat line inside -->
  <polyline points="35,78 42,78 44,72 47,84 50,72 53,84 56,78 65,78" 
            fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
</svg>
